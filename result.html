
{% extends 'base.html' %}
{% block body %}
<script>
    window.onload = function() {
        var text = "The predicted class is {{ pred_class }} with confidence {{ confidence|round(2) }}";
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        speechSynthesis.speak(utterance);
    }
</script>
<div class="row">
<div class="col-md-8">
<h3>Prediction Result</h3>
<p><strong>Predicted Class:</strong> {{ pred_class }}</p>
<p><strong>Confidence:</strong> {{ confidence*100 }}%</p>
<p><strong>Uploaded Image:</strong></p>
<img src="/{{ img_url }}" alt="uploaded" class="img-fluid" style="max-width:350px;">
<br><br>
<a class="btn btn-secondary" href="/">Back</a>
</div>
</div>
{% endblock %}
